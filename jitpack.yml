# JitPack configuration for this multi-module repo.
#
# We let JitPack run its default multi-module build (`mvn install` on the
# reactor) so it correctly publishes each submodule as a resolvable artifact:
#   com.github.bloupyi.MinecraftAnimationTool:MinecraftAnimationTool-API:<tag>
# (a custom `install: -pl mat-api` produced a green build but no resolvable
# artifact, so it was removed).
#
# JDK 17 is forced because JitPack otherwise defaults to an older JDK.
jdk:
  - openjdk17
