# Ticks between each interpolation step computed by the plugin (minimum 1).
interpolation-updates: 1

# When true, also use Minecraft's native block-display interpolation so the client
# smoothly tweens between the plugin's steps. When false, each step snaps instantly.
use-minecraft-interpolation: true

# Number of ticks to cross-fade from the current pose into a newly played animation.
# 0 disables blending (animations snap to their first frame).
animation-blend-ticks: 4

# Skip pushing transform updates to block displays when no player is within this many
# blocks of a rig. Animation time keeps advancing while culled, so playback stays in sync
# and resumes seamlessly when a player comes back into range. 0 disables culling.
cull-distance: 0

# Light-level override for every block display (each 0-15: 15 = fully lit, 0 = pitch black).
# Flat / planar parts only show one face direction, so under natural world lighting they can
# look very dark; forcing a brightness keeps the whole rig evenly lit. Set either value to -1
# to use the world's natural lighting at the display's position instead.
display-block-light: 15
display-sky-light: 15

# Persist spawned rigs across server restarts and plugin reloads. When true, rigs (and their
# current animation) are saved to rigs.yml and recreated on startup; leftover rig entities from
# a previous run are cleaned up automatically. Set to false to make rigs disappear on shutdown.
persist-rigs: true
